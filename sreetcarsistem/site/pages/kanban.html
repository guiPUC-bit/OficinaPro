<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oficina Pro - Dashboard Profissional</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/kanban.css" />
</head>

<body>
  <div id="root"></div>

  <!-- Bibliotecas via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- COMPONENTES AUXILIARES ---
    const Icon = ({ name, size = 16, color = "currentColor", className = "" }) => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size, color }} className={className}></i>;
    };

    const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);

    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[c]));

    const getDamagedPartsFromBudget = (orcamento) => {
      if (Array.isArray(orcamento?.itens) && orcamento.itens.length) {
        const parts = [];
        for (const it of orcamento.itens) {
          if (!it) continue;
          if (it.tipo === 'grupo') {
            const pecas = Array.isArray(it.pecas) ? it.pecas : [];
            for (const p of pecas) {
              if (p?.nome) parts.push(p.nome);
            }
            continue;
          }
          if (it.parte) parts.push(it.parte);
        }
        return parts;
      }
      return orcamento?.danos || [];
    };

    const svgToDataUrl = (damagedParts = []) => {
      const container = document.createElement('div');
      container.innerHTML = CAR_SVG_HTML;
      const svg = container.querySelector('svg');
      if (!svg) return null;

      svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      svg.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
      svg.setAttribute('width', '560');
      svg.removeAttribute('height');

      const normalized = (damagedParts || []).map(p => String(p).toLowerCase());
      const set = new Set(normalized);

      const parts = svg.querySelectorAll('[data-parte]');
      parts.forEach(el => {
        const parte = (el.getAttribute('data-parte') || '').toLowerCase();
        const isMatch =
          set.has(parte) ||
          Array.from(set).some(d => d && (parte.includes(d) || d.includes(parte)));

        if (isMatch) {
          el.setAttribute('fill', '#ff6a00');
          el.setAttribute('stroke', '#ff6a00');
          el.setAttribute('stroke-width', '3');
        } else {
          el.setAttribute('fill', '#666666');
          el.setAttribute('stroke', '#999999');
          el.setAttribute('stroke-width', '1.5');
        }
      });

      const bases = svg.querySelectorAll('.car-base-outline');
      bases.forEach(b => {
        b.setAttribute('fill', '#252525');
        b.setAttribute('stroke', '#444444');
        b.setAttribute('stroke-width', '5');
      });

      try {
        const serializer = new XMLSerializer();
        const svgStr = serializer.serializeToString(svg);
        const svg64 = btoa(unescape(encodeURIComponent(svgStr)));
        return `data:image/svg+xml;base64,${svg64}`;
      } catch {
        return null;
      }
    };

    const fileSafeSegment = (value) => {
      const raw = String(value || '').trim();
      if (!raw) return '';
      const norm = typeof raw.normalize === 'function' ? raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '') : raw;
      const cleaned = norm
        .replace(/[<>:"/\\|?*\x00-\x1F]/g, '')
        .replace(/\s+/g, '-')
        .replace(/[^a-zA-Z0-9-_]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^[-_]+|[-_]+$/g, '');
      return cleaned.slice(0, 60);
    };

    const buildPdfFilename = (orcamento) => {
      const nome = fileSafeSegment(orcamento?.cliente?.nome || orcamento?.cliente);
      const modelo = fileSafeSegment(orcamento?.veiculo?.modelo || orcamento?.veiculo);
      const parts = ['orc', nome, modelo].filter(Boolean);
      const base = parts.length > 1 ? parts.join('-') : `orc-${fileSafeSegment(orcamento?.id) || 'orcamento'}`;
      return `${base}.pdf`;
    };

    const downloadBudgetPdf = async (orcamento) => {
      if (typeof html2pdf === 'undefined') {
        alert('Não foi possível gerar o PDF. Recarregue a página.');
        return;
      }

      const valorTotal = orcamento.total || orcamento.valor || 0;
      const damaged = getDamagedPartsFromBudget(orcamento);
      const carImg = svgToDataUrl(damaged);

      const itens = Array.isArray(orcamento.itens) ? orcamento.itens : [];
      const danos = Array.isArray(orcamento.danos) ? orcamento.danos : [];

      const rows = (() => {
        if (itens.length) {
          return itens.map((it) => {
            if (it?.tipo === 'grupo') {
              const pecasTxt = (it.pecas || []).map(p => p.nome).filter(Boolean).join(' • ');
              return `
                <tr>
                  <td>Grupo (${(it.pecas || []).length})</td>
                  <td>${esc(pecasTxt || '—')}</td>
                  <td style="text-align:right;">${formatCurrency(it.valorTotal)}</td>
                </tr>
              `;
            }
            const serv = [it?.tipo || '—', ...((it?.servicos) || [])].join(' + ');
            return `
              <tr>
                <td>${esc(it?.parte || '—')}</td>
                <td>${esc(serv || '—')}</td>
                <td style="text-align:right;">${formatCurrency(it?.maoDeObra || 0)}</td>
              </tr>
            `;
          }).join('');
        }
        if (danos.length) {
          const per = danos.length ? (valorTotal / danos.length) : valorTotal;
          return danos.map(d => `
            <tr>
              <td>${esc(d)}</td>
              <td>Reparo Técnico</td>
              <td style="text-align:right;">${formatCurrency(per)}</td>
            </tr>
          `).join('');
        }
        return `<tr><td colspan="3" style="text-align:center; color:#777;">Nenhum item</td></tr>`;
      })();

      const tmp = document.createElement('div');
      tmp.style.width = '700px';
      tmp.style.background = '#fff';
      tmp.style.color = '#111';
      tmp.style.padding = '24px';
      tmp.style.boxSizing = 'border-box';
      tmp.style.fontFamily = "Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif";
      tmp.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #eee; padding-bottom:12px; margin-bottom:18px;">
          <div style="font-weight:900; font-size:22px;">Oficina<span style="color:#ff6a00">Pro</span></div>
          <div style="text-align:right;">
            <div style="font-weight:900; font-size:18px;">Orçamento - ${esc(orcamento.cliente?.nome || orcamento.cliente || '—')}</div>
            <div style="color:#666;">Nº: ${esc(orcamento.id)}</div>
            <div style="color:#666;">Data: ${esc(orcamento.date || new Date().toLocaleDateString('pt-BR'))}</div>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px 18px; margin-bottom:16px;">
          <div><div style="font-size:12px; color:#666; text-transform:uppercase;">Cliente</div><div style="font-weight:800;">${esc(orcamento.cliente?.nome || orcamento.cliente || '—')}</div></div>
          <div><div style="font-size:12px; color:#666; text-transform:uppercase;">Telefone</div><div style="font-weight:800;">${esc(orcamento.cliente?.telefone || '—')}</div></div>
          <div><div style="font-size:12px; color:#666; text-transform:uppercase;">Veículo</div><div style="font-weight:800;">${esc((orcamento.veiculo?.fabricante || '') + ' ' + (orcamento.veiculo?.modelo || orcamento.veiculo || ''))}</div></div>
          <div><div style="font-size:12px; color:#666; text-transform:uppercase;">Placa / Cor</div><div style="font-weight:800;">${esc((orcamento.veiculo?.placa || orcamento.placa || '—') + ' • ' + (orcamento.veiculo?.cor || '—'))}</div></div>
        </div>

        <div style="border:1px solid #eee; border-radius:12px; padding:10px; display:flex; justify-content:center; margin-bottom:16px;">
          ${carImg ? `<img src="${carImg}" alt="Diagrama do carro" style="max-width:560px; width:100%; height:auto; display:block;" />` : '<div style="text-align:center; color:#999; padding:24px;">Sem diagrama</div>'}
        </div>

        <table style="width:100%; border-collapse:collapse; border:1px solid #eee; table-layout:fixed;">
          <thead>
            <tr>
              <th style="background:#f7f7f7; border:1px solid #eee; padding:8px 10px; text-align:left;">Peça</th>
              <th style="background:#f7f7f7; border:1px solid #eee; padding:8px 10px; text-align:left;">Serviço</th>
              <th style="background:#f7f7f7; border:1px solid #eee; padding:8px 10px; text-align:right;">Valor</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>

        <div style="margin-top:12px; border-top:2px solid #eee; padding-top:12px;">
          <div style="display:flex; justify-content:space-between; font-weight:900; font-size:16px;">
            <span>Valor Total</span>
            <span>${formatCurrency(valorTotal)}</span>
          </div>
        </div>
      `;

      document.body.appendChild(tmp);
      tmp.style.position = 'fixed';
      tmp.style.left = '50%';
      tmp.style.top = '0';
      tmp.style.transform = 'translateX(-50%)';
      tmp.style.zIndex = '9999';

      const opt = {
        margin: 8,
        filename: buildPdfFilename(orcamento),
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', windowWidth: tmp.scrollWidth, windowHeight: tmp.scrollHeight },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      try {
        await html2pdf().set(opt).from(tmp).save();
      } finally {
        document.body.removeChild(tmp);
      }
    };

    const PDF_STORE_KEY = 'oficinaPro_orcamentoPdfs';
    const loadPdfStore = () => {
      try {
        const raw = localStorage.getItem(PDF_STORE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    };

    const savePdfStore = (store) => {
      localStorage.setItem(PDF_STORE_KEY, JSON.stringify(store));
    };

    const dataUriToBlobUrl = (dataUri) => {
      try {
        const [meta, data] = String(dataUri).split(',');
        const isBase64 = meta.includes('base64');
        const mime = (meta.match(/data:([^;]+)/) || [])[1] || 'application/pdf';
        let bytes;
        if (isBase64) {
          const bin = atob(data);
          bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        } else {
          const txt = decodeURIComponent(data);
          bytes = new TextEncoder().encode(txt);
        }
        const blob = new Blob([bytes], { type: mime });
        return URL.createObjectURL(blob);
      } catch {
        return null;
      }
    };

          <path id="f_parachoque" class="car-part-active" data-parte="Para-choque Dianteiro" d="M78,268c8.237,11.107,9.921,25.831,21,34,20.89,15.4,57.823,16.916,85,25l62,25H454l78-19c17.561-4.789,35.8-6.664,50-15,20.39-11.969,22.148-31.011,37-48,0.337,47.529-9.533,93.991-13,138l-10,8H222c-30.658,0-105.358,8.765-126-4C81.8,375.867,78.261,315.122,78,268Z"/>

    // --- COMPONENTE: DIAGRAMA DO CARRO SVG (ESTÁTICO) ---
    const CarDiagram = ({ damagedParts = [] }) => {
      const wrapRef = useRef(null);

      useEffect(() => {
        const root = wrapRef.current;
        if (!root) return;

        const normalized = (damagedParts || []).map(p => String(p).toLowerCase());
        const damagedSet = new Set(normalized);
        const els = root.querySelectorAll('[data-parte]');

        els.forEach(el => {
          const parte = (el.getAttribute('data-parte') || '').toLowerCase();
          const isMatch =
            damagedSet.has(parte) ||
            Array.from(damagedSet).some(d => d && (parte.includes(d) || d.includes(parte)));

          if (isMatch) el.classList.add('damaged');
          else el.classList.remove('damaged');
        });
      }, [damagedParts]);

      return (
        <div
          className="car-preview-box"
          ref={wrapRef}
          dangerouslySetInnerHTML={{ __html: `<div class="svg-wrapper svg-wrapper-static">${CAR_SVG_HTML}</div>` }}
        />
      );
    };

    // --- COMPONENTE: DRAWER (PAINEL LATERAL) ---
    const BudgetDrawer = ({ orcamento, isOpen, onClose, onUpdateCost }) => {
      if (!orcamento) return null;

      const valorCobrado = orcamento.total || orcamento.valor || 0;
      const custo = orcamento.custo || 0;
      const lucro = valorCobrado - custo;
      
      const damagedParts = (() => {
        if (Array.isArray(orcamento.itens) && orcamento.itens.length) {
          const parts = [];
          for (const it of orcamento.itens) {
            if (!it) continue;
            if (it.tipo === 'grupo') {
              const pecas = Array.isArray(it.pecas) ? it.pecas : [];
              for (const p of pecas) {
                if (p?.nome) parts.push(p.nome);
              }
              continue;
            }
            if (it.parte) parts.push(it.parte);
          }
          return parts;
        }
        return orcamento.danos || [];
      })();
      const costRef = useRef(null);
      const [costInput, setCostInput] = useState(custo === 0 ? '' : String(custo));

      useEffect(() => {
        setCostInput((orcamento.custo || 0) === 0 ? '' : String(orcamento.custo));
      }, [orcamento?.id]);

      useEffect(() => {
        if (isOpen && orcamento.status === 'concluido' && (orcamento.custo || 0) === 0 && costRef.current) {
          costRef.current.focus();
        }
      }, [isOpen, orcamento?.id]);

      const handleCostChange = (e) => {
        const raw = e.target.value;
        setCostInput(raw);
        const next = raw === '' ? 0 : (parseFloat(raw) || 0);
        onUpdateCost?.(orcamento.id, next);
      };

      return (
        <div className={`drawer-overlay ${isOpen ? 'open' : ''}`} onClick={onClose}>
          <div className="drawer-panel" onClick={e => e.stopPropagation()}>
            <div className="drawer-header">
              <h2>Orçamento <span style={{color: 'var(--accent)'}}>#{orcamento.id.toString().slice(-4)}</span></h2>
              <button className="btn-close" onClick={onClose}>
                <Icon name="x" size={20} />
              </button>
            </div>
            
            <div className="drawer-body">
              {/* Cliente e Veículo */}
              <div className="drawer-section">
                <h3><Icon name="user" size={18} /> INFORMAÇÕES GERAIS</h3>
                <div className="info-grid">
                  <div className="info-item">
                    <label>Cliente</label>
                    <span>{orcamento.cliente?.nome || orcamento.cliente}</span>
                  </div>
                  <div className="info-item">
                    <label>Telefone</label>
                    <span>{orcamento.cliente?.telefone || '(11) 99999-9999'}</span>
                  </div>
                  <div className="info-item">
                    <label>Veículo</label>
                    <span>{orcamento.veiculo?.fabricante} {orcamento.veiculo?.modelo || orcamento.veiculo}</span>
                  </div>
                  <div className="info-item">
                    <label>Placa / Cor</label>
                    <span>{orcamento.veiculo?.placa || orcamento.placa} • {orcamento.veiculo?.cor || 'N/A'}</span>
                  </div>
                </div>
              </div>

              {/* Diagrama Visual */}
              <div className="drawer-section">
                <h3><Icon name="camera" size={18} /> INSPEÇÃO VISUAL</h3>
                <CarDiagram damagedParts={damagedParts} />
              </div>

              {/* Lista de Serviços */}
              <div className="drawer-section">
                <h3><Icon name="clipboard-list" size={18} /> SERVIÇOS E PEÇAS</h3>
                <div className="services-list">
                  {(orcamento.itens || []).map((item, idx) => {
                    if (item?.tipo === 'grupo') {
                      const pecasTxt = (item.pecas || []).map(p => p.nome).filter(Boolean).join(' • ');
                      return (
                        <div key={idx} className="service-row">
                          <div className="service-main">
                            <h4>Grupo de peças</h4>
                            <div className="service-sub">{pecasTxt || '—'}</div>
                          </div>
                          <div className="service-price">{formatCurrency(item.valorTotal)}</div>
                        </div>
                      );
                    }

                    return (
                      <div key={idx} className="service-row">
                        <div className="service-main">
                          <h4>{item.parte}</h4>
                          <div className="service-sub">{item.tipo} • {item.servicos?.join(' + ') || 'Reparo Técnico'}</div>
                        </div>
                        <div className="service-price">{formatCurrency(item.maoDeObra)}</div>
                      </div>
                    );
                  })}
                  {(!orcamento.itens || orcamento.itens.length === 0) && (orcamento.danos || []).map((d, idx) => (
                    <div key={idx} className="service-row">
                      <div className="service-main">
                        <h4>{d}</h4>
                        <div className="service-sub">Reparo Técnico</div>
                      </div>
                      <div className="service-price">{formatCurrency(orcamento.valor / orcamento.danos.length)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Resumo Financeiro */}
              <div className="drawer-section">
                <h3><Icon name="trending-up" size={18} /> RESUMO FINANCEIRO</h3>
                <div className="financial-card">
                  <div className="financial-row">
                    <span>Valor Bruto Serviços</span>
                    <span>{formatCurrency(valorCobrado)}</span>
                  </div>
                  <div className="financial-row">
                    <span>Custo Operacional (Peças/MO)</span>
                    <div className="cost-input-group">
                      <span className="cost-prefix">R$</span>
                      <input
                        ref={costRef}
                        type="number"
                        step="0.01"
                        min="0"
                        className="cost-input"
                        placeholder="0"
                        value={costInput}
                        onChange={handleCostChange}
                      />
                    </div>
                  </div>
                  <div className="financial-row profit">
                    <span>Margem de Lucro Estimada</span>
                    <span>{formatCurrency(lucro)}</span>
                  </div>
                  <div className="financial-row total">
                    <span>VALOR COBRADO</span>
                    <span>{formatCurrency(valorCobrado)}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENTE: CARD DO KANBAN ---
    const BudgetCard = ({ item, onClick, onMenu }) => {
      const valorCobrado = item.total || item.valor || 0;
      const lucro = valorCobrado - (item.custo || 0);
      const dateLabel = item.date
        ? new Date(`${item.date}T00:00:00`).toLocaleDateString('pt-BR')
        : new Date().toLocaleDateString('pt-BR');

      return (
        <div className="budget-card" onClick={() => onClick(item)} data-id={item.id}>
          <div className="card-header">
            <div>
              <h4 className="client-name">{item.cliente?.nome || item.cliente || 'Cliente'}</h4>
              <div className="vehicle-model">{item.veiculo?.modelo || item.veiculo}</div>
            </div>
            <button
              type="button"
              className="card-menu-btn"
              aria-label="Opções"
              onClick={(e) => {
                e.stopPropagation();
                onMenu(e, item);
              }}
            >
              <Icon name="more-horizontal" size={18} color="currentColor" />
            </button>
          </div>
          
          <div className="card-tags">
            <div className="tag-pill"><Icon name="hash" size={12} /> {item.veiculo?.placa || item.placa}</div>
            <div className="tag-pill"><Icon name="calendar" size={12} /> {dateLabel}</div>
          </div>
          
          <div className="card-footer">
            <div className="price-text">{formatCurrency(valorCobrado)}</div>
            {item.status === 'concluido' && (
              <div className="profit-text">
                <Icon name="trending-up" size={14} /> {formatCurrency(lucro)}
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- COMPONENTE: COLUNA DO KANBAN ---
    const Column = ({ id, title, count, items, onCardClick, onCardMenu }) => {
      const colRef = useRef(null);
      const colClass = id === 'espera' ? 'col-wait' : id === 'andamento' ? 'col-progress' : 'col-done';

      return (
        <div className={`kanban-column ${colClass}`}>
          <div className="column-header">
            <div className="column-title-box">
              <div className="column-indicator" style={{background: 'var(--indicator-color)'}}></div>
              <h3>{title}</h3>
            </div>
            <span className="count-pill">{count}</span>
          </div>
          <div className="column-cards" ref={colRef} data-status={id}>
            {items.map(item => <BudgetCard key={item.id} item={item} onClick={onCardClick} onMenu={onCardMenu} />)}
          </div>
        </div>
      );
    };

    // --- COMPONENTE PRINCIPAL: APP ---
    const App = () => {
      const [items, setItems] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [searchDate, setSearchDate] = useState('');
      const [selectedOrcamento, setSelectedOrcamento] = useState(null);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [activeSidebar, setActiveSidebar] = useState('fluxo');
      const [menu, setMenu] = useState(null);
      const [pdfViewer, setPdfViewer] = useState(null);

      useEffect(() => {
        const raw = localStorage.getItem('oficinaPro_orcamentos');
        const data = raw ? JSON.parse(raw) : [
          { id: 'ORC-1024', cliente: {nome: 'João Silva', telefone: '(11) 98877-6655'}, veiculo: {modelo: 'Civic G10', fabricante: 'Honda', placa: 'ABC-1234', cor: 'Prata'}, total: 1250, status: 'espera', custo: 0, danos: ['Capô', 'Para-brisa'] },
          { id: 'ORC-1025', cliente: {nome: 'Maria Souza', telefone: '(11) 97766-5544'}, veiculo: {modelo: 'Corolla XEi', fabricante: 'Toyota', placa: 'DFG-5678', cor: 'Branco'}, total: 850, status: 'andamento', custo: 0, danos: ['Porta Dianteira'] },
          { id: 'ORC-1026', cliente: {nome: 'Carlos Luz', telefone: '(11) 96655-4433'}, veiculo: {modelo: 'Golf GTI', fabricante: 'VW', placa: 'GHI-9012', cor: 'Preto'}, total: 2100, status: 'concluido', custo: 450, danos: ['Teto', 'Para-lama Traseiro'] }
        ];
        const mapped = (Array.isArray(data) ? data : []).map(o => {
          const status = o?.status;
          if (status === 'orcamento') return { ...o, status: 'espera' };
          if (status === 'em_andamento') return { ...o, status: 'andamento' };
          if (status === 'atendido') return { ...o, status: 'concluido' };
          return o;
        });
        setItems(mapped);
      }, []);

      useEffect(() => {
        if (items.length > 0 && activeSidebar === 'fluxo') initSortable();
      }, [items, activeSidebar]);

      useEffect(() => {
        if (!menu) return;
        const onDown = (e) => {
          if (e.target.closest('.card-menu-pop')) return;
          setMenu(null);
        };
        document.addEventListener('mousedown', onDown);
        return () => document.removeEventListener('mousedown', onDown);
      }, [menu]);

      useEffect(() => {
        return () => {
          if (pdfViewer?.blobUrl) URL.revokeObjectURL(pdfViewer.blobUrl);
        };
      }, [pdfViewer?.blobUrl]);

      const initSortable = () => {
        ['espera', 'andamento', 'concluido'].forEach(status => {
          const el = document.querySelector(`[data-status="${status}"]`);
          if (el && !el.sortable) {
            new Sortable(el, {
              group: 'kanban',
              animation: 150,
              ghostClass: 'sortable-ghost',
              filter: '.card-menu-btn',
              preventOnFilter: false,
              onEnd: (evt) => {
                const id = evt.item.dataset.id;
                const newStatus = evt.to.dataset.status;
                updateStatus(id, newStatus);
              }
            });
            el.sortable = true;
          }
        });
      };

      const updateStatus = (id, newStatus) => {
        setItems(prev => {
          const budget = prev.find(o => o.id === id);
          const updated = prev.map(o => o.id === id ? { ...o, status: newStatus } : o);
          localStorage.setItem('oficinaPro_orcamentos', JSON.stringify(updated));
          if (newStatus === 'concluido' && budget) {
             setSelectedOrcamento({...budget, status: newStatus});
             setIsDrawerOpen(true);
          }
          return updated;
        });
      };

      const filteredItems = useMemo(() => {
        const s = searchTerm.toLowerCase();
        const hasText = Boolean(s);

        return items.filter(i => {
          if (searchDate && String(i?.date || '') !== String(searchDate)) return false;

          if (!hasText) return true;

          const nome = (i.cliente?.nome || i.cliente || '').toLowerCase();
          const modelo = (i.veiculo?.modelo || '').toLowerCase();
          const fabricante = (i.veiculo?.fabricante || '').toLowerCase();
          const placa = (i.veiculo?.placa || i.placa || '').toLowerCase();
          const dateYmd = String(i?.date || '').toLowerCase();
          const datePt = i?.date ? new Date(`${i.date}T00:00:00`).toLocaleDateString('pt-BR').toLowerCase() : '';

          return (
            nome.includes(s) ||
            modelo.includes(s) ||
            fabricante.includes(s) ||
            placa.includes(s) ||
            dateYmd.includes(s) ||
            datePt.includes(s)
          );
        });
      }, [items, searchTerm, searchDate]);

      const handleCardClick = (orc) => {
        setSelectedOrcamento(orc);
        setIsDrawerOpen(true);
      };

      const handleCardMenu = (e, orc) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const width = 210;
        const height = 104;

        let left = rect.right + 10;
        let top = rect.top - 8;
        if (left + width > window.innerWidth - 10) left = rect.left - width - 10;
        if (top + height > window.innerHeight - 10) top = window.innerHeight - height - 10;
        if (top < 10) top = 10;

        setMenu({ id: orc.id, top, left, orcamento: orc });
      };

      const deleteBudget = (id) => {
        setItems(prev => {
          const updated = prev.filter(o => o.id !== id);
          localStorage.setItem('oficinaPro_orcamentos', JSON.stringify(updated));
          return updated;
        });
        try {
          const store = loadPdfStore();
          if (store && store[id]) {
            delete store[id];
            savePdfStore(store);
          }
        } catch {}
        if (selectedOrcamento?.id === id) {
          setIsDrawerOpen(false);
          setSelectedOrcamento(null);
        }
        setMenu(null);
      };

      const openPdfViewer = (orcamento) => {
        const store = loadPdfStore();
        const entry = store?.[orcamento.id];
        const dataUri = entry?.dataUri || entry;
        if (!dataUri) {
          alert('PDF ainda não está disponível para este orçamento.');
          return;
        }
        const blobUrl = dataUriToBlobUrl(dataUri);
        if (!blobUrl) {
          alert('Não foi possível abrir o PDF.');
          return;
        }
        setPdfViewer({ id: orcamento.id, blobUrl, dataUri, filename: buildPdfFilename(orcamento) });
      };

      return (
        <div className="app-shell">
          <aside className="sidebar">
            <div
              className={`sidebar-icon ${activeSidebar === 'home' ? 'active' : ''}`}
              onClick={() => {
                setActiveSidebar('home');
                window.location.href = '../index.html';
              }}
            >
              <Icon name="home" size={24} />
            </div>

            <div
              className={`sidebar-icon ${activeSidebar === 'fluxo' ? 'active' : ''}`}
              onClick={() => {
                setActiveSidebar('fluxo');
                window.location.href = 'kanban.html';
              }}
            >
              <Icon name="users" size={24} />
            </div>

            <div className="sidebar-icon" style={{marginTop: 'auto'}}>
              <Icon name="log-out" size={24} />
            </div>
          </aside>

          <main className="main-content">
            <header className="top-header">
              <div className="header-title">
                <h1>Fluxo de <span style={{color: 'var(--accent)'}}>Serviços</span></h1>
              </div>

              <div className="search-wrapper">
                <div className="search-text">
                  <Icon name="search" size={18} className="search-icon" />
                  <input 
                    type="text" 
                    className="search-input" 
                    placeholder="Buscar cliente, marca, modelo, placa ou data..." 
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>

                <input
                  type="date"
                  className="search-date"
                  aria-label="Filtrar por data"
                  value={searchDate}
                  onChange={(e) => setSearchDate(e.target.value)}
                />
              </div>

              <button className="btn-new" onClick={() => window.location.href='novo-orcamento.html'}>
                <Icon name="plus" size={18} /> Novo Orçamento
              </button>
            </header>

            <div className="kanban-wrapper">
              <Column id="espera" title="Em Espera" count={filteredItems.filter(i => i.status === 'espera').length} items={filteredItems.filter(i => i.status === 'espera')} onCardClick={handleCardClick} onCardMenu={handleCardMenu} />
              <Column id="andamento" title="Em Andamento" count={filteredItems.filter(i => i.status === 'andamento').length} items={filteredItems.filter(i => i.status === 'andamento')} onCardClick={handleCardClick} onCardMenu={handleCardMenu} />
              <Column id="concluido" title="Concluído" count={filteredItems.filter(i => i.status === 'concluido').length} items={filteredItems.filter(i => i.status === 'concluido')} onCardClick={handleCardClick} onCardMenu={handleCardMenu} />
            </div>
          </main>

          {menu && (
            <div className="card-menu-pop" style={{ top: `${menu.top}px`, left: `${menu.left}px` }}>
              <button
                type="button"
                className="card-menu-item"
                onClick={() => {
                  setMenu(null);
                  openPdfViewer(menu.orcamento);
                }}
              >
                <Icon name="file-text" size={16} /> PDF
              </button>
              <div className="card-menu-sep"></div>
              <button
                type="button"
                className="card-menu-item danger"
                onClick={() => deleteBudget(menu.id)}
              >
                <Icon name="trash-2" size={16} /> Apagar
              </button>
            </div>
          )}

          {pdfViewer && (
            <div className="pdf-viewer-overlay" onClick={() => setPdfViewer(null)}>
              <div className="pdf-viewer-panel" onClick={(e) => e.stopPropagation()}>
                <div className="pdf-viewer-header">
                  <div className="pdf-viewer-title">
                    <Icon name="file-text" size={18} /> PDF do Orçamento
                  </div>
                  <div className="pdf-viewer-actions">
                    <a className="pdf-download-btn" href={pdfViewer.dataUri} download={pdfViewer.filename || `orc-${pdfViewer.id}.pdf`}>
                      <Icon name="download" size={16} /> Baixar PDF
                    </a>
                    <button type="button" className="pdf-close-btn" onClick={() => setPdfViewer(null)}>
                      <Icon name="x" size={18} />
                    </button>
                  </div>
                </div>
                <iframe className="pdf-frame" src={pdfViewer.blobUrl} title={`PDF ${pdfViewer.id}`} />
              </div>
            </div>
          )}

          <BudgetDrawer 
            orcamento={selectedOrcamento} 
            isOpen={isDrawerOpen} 
            onClose={() => setIsDrawerOpen(false)} 
            onUpdateCost={(id, custo) => {
              setItems(prev => {
                const updated = prev.map(o => o.id === id ? { ...o, custo } : o);
                localStorage.setItem('oficinaPro_orcamentos', JSON.stringify(updated));
                return updated;
              });
              setSelectedOrcamento(prev => (prev && prev.id === id ? { ...prev, custo } : prev));
            }}
          />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
