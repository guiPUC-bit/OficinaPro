<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novo Orçamento - Oficina Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/novo-orcamento.css?v=1.4" />
</head>

<body>
  <div class="orcamento-container">
    <header class="header-simple">
      <a class="back-link" href="../index.html" aria-label="Voltar">Voltar</a>
      <h1>Novo <span class="orange">Orçamento</span></h1>
      <span></span>
    </header>

    <main class="content">
      <!-- 1. DADOS DO CLIENTE -->
      <section class="section-card">
        <h3 class="section-title"><i data-lucide="user"></i> Dados do Cliente</h3>
        <div class="grid-form">
          <input id="cliente-nome" type="text" placeholder="Nome do Cliente" class="input-dark" aria-label="Nome do Cliente" autocomplete="name" />
          <input id="cliente-cpf" type="text" placeholder="CPF" class="input-dark" aria-label="CPF" inputmode="numeric" autocomplete="off" maxlength="14" />
          <input id="cliente-telefone" type="text" placeholder="Telefone" class="input-dark" aria-label="Telefone" inputmode="tel" autocomplete="tel" maxlength="15" />
          <div class="email-row">
            <input id="cliente-email-user" type="text" placeholder="Email" class="input-dark" aria-label="Email (usuário)" inputmode="email" autocomplete="email" />
            <select id="cliente-email-domain" class="input-dark email-domain" aria-label="Email (domínio)">
              <option value="gmail.com">@gmail.com</option>
              <option value="outlook.com">@outlook.com</option>
              <option value="hotmail.com">@hotmail.com</option>
              <option value="yahoo.com">@yahoo.com</option>
              <option value="icloud.com">@icloud.com</option>
              <option value="uol.com.br">@uol.com.br</option>
              <option value="bol.com.br">@bol.com.br</option>
              <option value="globo.com">@globo.com</option>
            </select>
            <input id="cliente-email" type="hidden" />
          </div>
          <input id="cliente-endereco" type="text" placeholder="Endereço" class="input-dark" aria-label="Endereço" autocomplete="street-address" style="grid-column: span 2;" />
        </div>
      </section>

      <!-- 2. DADOS DO VEÍCULO -->
      <section class="section-card">
        <h3 class="section-title"><i data-lucide="car"></i> Dados do Veículo</h3>
        <div class="grid-form">
          <input id="veiculo-fabricante" type="text" placeholder="Fabricante (Ex: Honda)" class="input-dark" />
          <input id="veiculo-modelo" type="text" placeholder="Modelo (Ex: Civic G10)" class="input-dark" />
          <div class="row-form">
            <input id="veiculo-ano" type="text" placeholder="Ano" class="input-dark" />
            <input id="veiculo-cor" type="text" placeholder="Cor" class="input-dark" />
            <input id="veiculo-placa" type="text" placeholder="Placa" class="input-dark" />
          </div>
        </div>
      </section>

      <!-- 2. CARRO INTERATIVO (SVG) -->
      <section class="section-card">
        <h3 class="section-title"><i data-lucide="car-front"></i> Diagrama de Avarias</h3>
        <p class="helper-text" style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 8px;">
          Toque na parte do veículo para adicionar dano.
        </p>

        <div class="hover-feedback" id="hover-feedback">Selecione uma parte...</div>

        <div class="select-toolbar">
          <button id="btn-toggle-select-parts" class="btn-toggle-select" type="button">
            Selecionar Peças
          </button>
          <div class="select-counter" id="select-counter" style="display:none;">0 peças selecionadas</div>
        </div>

        <div class="select-floating" id="select-floating" style="display:none;"></div>

        <div class="svg-wrapper" style="background: #181818; border: 1px solid #000000;">
          <svg viewBox="0 0 1200 1300" class="car-svg-ativo" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagrama de Avarias">

              <linearGradient id="grad-body" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
              </linearGradient>
            </defs>

      <!-- 3. LISTA DE ITENS E RESUMO -->
      <section class="bottom-grid">
        <section class="section-card items-card">
          <h3 class="section-title"><i data-lucide="wrench"></i> Itens do Orçamento</h3>
          <div class="items-list" id="items-list"></div>
        </section>

        <section class="summary-card">
          <div class="summary-row highlight">
            <span>Valor Total:</span>
            <span id="valor-total-final" style="color: var(--orange); font-weight: 900; font-size: 1.4rem;">R$ 0,00</span>
          </div>

          <div class="summary-row" style="margin-top: 14px; border-top: 1px solid #333; padding-top: 14px;">
            <span style="color: var(--text-dim); font-size: 0.9rem;">Status:</span>
            <select id="orc-status" class="input-dark" style="max-width: 220px;">
              <option value="espera" selected>Em Espera</option>
              <option value="andamento">Em Andamento</option>
              <option value="concluido">Concluído</option>
            </select>
          </div>
        </section>
      </section>

      <button id="btn-salvar-orcamento" class="btn-save" type="button">
        <i data-lucide="check-circle"></i>
        Salvar Orçamento
      </button>

      <button id="btn-export-pdf" class="btn-export btn-export-bottom" type="button" title="Gerar PDF">
        <i data-lucide="file-text"></i> Gerar PDF
      </button>
    </main>
  </div>

  <!-- ÁREA DE EXPORTAÇÃO (PDF) -->
  <div id="orcamento-pdf" style="display:none;">
    <!-- O conteúdo é montado dinamicamente via JS antes de gerar o PDF -->
  </div>

  <!-- MODAL DE DANO -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <h3>Dano em: <span id="modal-parte"></span></h3>

      <select id="dano-tipo" class="input-dark">
        <option value="" disabled selected hidden>Escolha o Serviço</option>
        <option value="Troca">Troca</option>
        <option value="Recuperação">Recuperação</option>
        <option value="Lanternagem">Lanternagem</option>
      </select>

      <div class="modal-services-grid">
        <label class="checkbox-container">
          <input type="checkbox" id="service-pintura" value="Pintura" />
          <span class="checkmark"></span>
          Pintura
        </label>
        <label class="checkbox-container">
          <input type="checkbox" id="service-polimento" value="Polimento" />
          <span class="checkmark"></span>
          Polimento
        </label>
      </div>

      <input id="dano-mao-obra" type="number" placeholder="Mão de Obra (R$)" class="input-dark" min="0" step="0.01" />

      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancelar-dano" type="button">Cancelar</button>
        <button class="btn-add" id="btn-adicionar-dano" type="button">Adicionar</button>
      </div>
    </div>
  </div>

  <!-- MODAL DE GRUPO DE PEÇAS -->
  <div class="modal-overlay" id="group-modal-overlay" style="display:none;">
    <div class="modal-content">
      <h3>Grupo de peças</h3>

      <div class="group-selected-list" id="group-parts-list"></div>

      <input id="group-total-input" type="number" placeholder="Valor total do conjunto (R$)" class="input-dark" min="0" step="0.01" />
      <div class="modal-error" id="group-modal-error" style="display:none;"></div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancelar-grupo" type="button">Cancelar</button>
        <button class="btn-add" id="btn-confirmar-grupo" type="button">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="../js/novo-orcamento.js"></script>
</body>
